# Stage 1 (rev2) — 중앙 기둥 1/3 축소(short pillar) 미로 fine-tune.
#   wall_mid 길이 6m→2m(pillar_half_len 3.0→1.0), 중앙(0,3) 유지 → y∈[2,4].
#   효과: 스폰(0,0)이 기둥에서 2m 분리(frozen서 시작-끼임 wp0 24→2 확인) + goal(0,6) 위 2m 열림.
#   → 정직한 설정 복귀: 스폰 (0,0) + goal_radius 1.0 (기하 hack 불필요).
#   ⚠️ 풀맵(pillar_half_len 기본 3.0)은 그대로 보존 — 추후 풀맵 재테스트용.
env_id: "AntMazeWaypoint-v0"
env_kwargs: {energy_coef: 0.02, time_penalty: 0.0, stall_penalty: 0.0, pillar_half_len: 1.0, start_xy: [0.0, 0.0]}
env_wrapper: "waypoint_follow"
# A* 웨이포인트(축소 기둥용): 짧고 부드러운 우회 — plan(pillar_half_len=1.0) 출력.
#   기존 conservative [(2.5,0),(2.5,6.3),(0,6)]의 sharp 90° 코너 대신 gentle 턴.
env_wrapper_kwargs: {goal_radius: 1.0, final_bonus: 100.0, subgoal_bonus: 10.0, waypoints: [[-1.0, 1.4], [-1.0, 4.6], [0.0, 6.0]]}
init_from: "models/checkpoints_stage1_maze_rebalance/ppo_final.zip"
total_timesteps: 2000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5   # init_from이 있으면 무시
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage1.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_stage1_maze_short"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: true
run_name: "stage1_maze_short_v1"
