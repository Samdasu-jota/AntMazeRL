# Stage 1 — 미로 웨이포인트 fine-tune (Phase 3, 필요 시): 전방향 워커를 기둥 미로에서
#   웨이포인트-follow로 추가학습. WaypointFollower가 goal_pos를 현재 서브목표로 바꿔치기.
#   기둥 코너 등 미로 특화 적응이 필요할 때만 사용(전방향 워커가 이미 ≥70%면 생략).
env_id: "AntMazeWaypoint-v0"      # 기둥 복귀(obstacle=True), goal_bonus=0(래퍼가 보너스 전담)
env_wrapper: "waypoint_follow"
env_wrapper_kwargs: {subgoal_bonus: 10.0, final_bonus: 50.0}
init_from: "models/checkpoints_stage1_omnidir/ppo_final.zip"
total_timesteps: 1000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage1.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_stage1_maze"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: true
run_name: "stage1_maze_waypoint_v1"
