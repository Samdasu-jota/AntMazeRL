# Stage 1 (rev2) / turn30 — 각도 커리큘럼 1단계 (±30°).
#   C0(penalty-rebalance)가 붕괴는 고쳤으나(goals/ep 0.05→1.1) mid-motion +y 턴(leg-2)서 막힘
#   (frozen 미로 13%, wp_idx 1서 55% 정체). 처방: resample 목표를 '현재 진행방향 ±30°'로
#   바이어스 → 부드러운 턴부터 자주 성공 → 턴 스킬 강화. 보상은 C0와 동일(각도만 변수).
#   게이트: 시퀀스 완주(3목표)가 C0의 ~4-15%서 확실히 상승해야(부드러운 턴=학습 가능 증거).
env_id: "AntMazeOpen-v0"
env_kwargs: {energy_coef: 0.02, time_penalty: 0.0, stall_penalty: 0.0, goal_bonus: 100.0}
env_wrapper: "random_sequence"
env_wrapper_kwargs: {max_goals: 3, dist_min: 2.0, dist_max: 4.0, max_turn_angle: 0.52}
init_from: "models/checkpoints_stage1_cmdfollow_rebalance/ppo_final.zip"
total_timesteps: 2000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5   # init_from이 있으면 무시(C0의 log_std 로드)
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage1.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_stage1_cmdfollow_turn30"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: true
run_name: "stage1_cmdfollow_turn30_v1"
