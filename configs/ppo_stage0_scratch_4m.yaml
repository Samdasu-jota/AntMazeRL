# Stage 0 커리큘럼 4m — scratch 트랙(3m PASS) 이어학습.
#   init_from = scratch-3m 체크포인트를 로드해 더 먼 목표(4m)로 이어학습(BC 건너뜀).
#   ⚠️ init_from 사용 시 PPO 하이퍼(log_std_init/ent_coef/net_arch 등)는 체크포인트에서 복원됨
#      (아래 값은 무시). learning_rate만 custom_objects로 새 선형감쇠 적용.
env_id: "AntMazeOpen-v0"
env_kwargs: {goal_y: 4.0}
init_from: "models/checkpoints_stage0_scratch/ppo_final.zip"
total_timesteps: 1000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage0.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_stage0_scratch_4m"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: true
run_name: "stage0_openplane_scratch_4m_v1"
