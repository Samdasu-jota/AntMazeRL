# Phase 2 (v2) — 자세 종료 + 직립 보너스 + 탐색노이즈 축소. 평지, 87% 워커 이어학습.
#   진단(eval_flip): 평지 워커 flip_rate 34%(det)/93%(stoch), 미로 워커 99%/60% 스텝.
#   v1(up_thresh=0.0, σ유지) 실패: σ0.53 탐색이 93% 에피소드 전복→자세종료가 78% 즉시 끝내
#     학습 굶김→87%가 30%로 붕괴, 회복 안 됨. std는 0.51 고정(저노이즈 미경험→못 낮춤).
#   v2 고침: override_log_std=-1.5(σ0.22)로 탐색 축소 → 전복 33%/성공100%(측정) → 대부분
#     에피소드 생존→신호 충분. 자세종료+직립보너스(+)가 잔여 33% 전복을 제거하도록 학습.
#   고침: termination에 up_z<up_thresh(0.0) 추가 + 보상 +up_bonus_coef·max(0,up_z).
#   suicide 방지: time/stall 페널티 0(bleed 제거) + 직립 보너스 +부호 + 전복종료 보상 0.
#   up_bonus_coef=0.1 — per-step 진행보상(~0.11) 규모. obs 109차원 유지(init_from 호환).
env_id: "AntMazeOpen-v0"
env_kwargs: {goal_y: 6.0, up_thresh: 0.0, up_bonus_coef: 0.1, time_penalty: 0.0, stall_penalty: 0.0}
init_from: "models/checkpoints_stage0_scratch_6m/ppo_final.zip"
override_log_std: -1.5   # 체크포인트 σ0.53→0.22. 자세종료가 학습 굶기는 것 방지(핵심 수정).
total_timesteps: 1000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5   # init_from이 있으면 무시
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage0.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_p2_upbonus_plane_v2"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: false
run_name: "p2_upbonus_plane_v2"
