# Stage 0 커리큘럼 6m — scratch 트랙(4m PASS) 이어학습 → 원래 목표 거리(6m).
#   6m은 obs가 BC 학습과 동일 영역으로 복귀(goal-rel y≈6). 이후 Stage 1(미로+A*) 준비 완료.
env_id: "AntMazeOpen-v0"
env_kwargs: {goal_y: 6.0}
init_from: "models/checkpoints_stage0_scratch_4m/ppo_final.zip"
total_timesteps: 1000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage0.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_stage0_scratch_6m"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: true
run_name: "stage0_openplane_scratch_6m_v1"
