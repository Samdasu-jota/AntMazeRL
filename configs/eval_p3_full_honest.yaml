# Phase A 풀맵 zero-shot eval — ppo_p3_maze_upright.yaml 복제 + pillar 3.0 + 풀 A* 웨이포인트.
#   88% 체크포인트(p3, 축소기둥 학습)를 풀맵(3.0)서 그냥 평가(학습 0). eval_flip/eval_waypoint용 env 재구성.
#   88% 런과 단 2변수만 다름: pillar_half_len(1.0→3.0), waypoints(축소 A*→풀 A* [[1,0],[1,6],[0,6]]).
#   나머지 honest 설정 동일(up_thresh 0.0, up_bonus 0.1, start_xy(0,0), goal_radius 1.0).
env_id: "AntMazeWaypoint-v0"
env_kwargs: {energy_coef: 0.02, time_penalty: 0.0, stall_penalty: 0.0, pillar_half_len: 3.0, start_xy: [0.0, 0.0], up_thresh: 0.0, up_bonus_coef: 0.1}
env_wrapper: "waypoint_follow"
env_wrapper_kwargs: {goal_radius: 1.0, final_bonus: 100.0, subgoal_bonus: 10.0, waypoints: [[1.0, 0.0], [1.0, 6.0], [0.0, 6.0]]}
init_from: "models/checkpoints_p2_upbonus_plane_v2/ppo_final.zip"
override_log_std: -1.5
total_timesteps: 2000000
n_envs: 4
learning_rate: 1.0e-4
n_steps: 2048
batch_size: 256
gamma: 0.99
clip_range: 0.2
n_epochs: 10
target_kl: 0.05
ent_coef: 0.005
log_std_init: -0.5
norm_reward: true
clip_reward: 10.0
bc_policy_path: "models/NO_BC_stage1.pt"
norm_stats_path: "data/obs_norm_stats.npz"
checkpoint_dir: "models/checkpoints_p3_maze_upright"
checkpoint_freq: 100000
warmstart_eval_episodes: 20
vec_env: "dummy"
wandb_project: "AntMazeRL"
use_wandb: false
run_name: "eval_p3_full_honest"
